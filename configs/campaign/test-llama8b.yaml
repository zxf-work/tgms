# Size-matched cross-family portability run (CIDR): ours only, frozen
# CollegeMsg test split, Llama-3.1-8B-Instruct (ungated mirror) — a
# different family from Qwen at ~8B, matching the Qwen-7B size point so
# family, not size, is the variable.
suite_path: stores/suite-collegemsg/suite.json
store_path: stores/collegemsg
out_dir: runs/test-llama8b
split: test
systems: [ours]
models: ["openai/NousResearch/Meta-Llama-3.1-8B-Instruct"]
seeds: [0]
max_repairs: 3
memory_db: stores/collegemsg/memory.sqlite
llm_max_tokens: 1024
llm_api_base: "http://localhost:8000/v1"
llm_api_key: "EMPTY"
